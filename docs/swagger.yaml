basePath: /
definitions:
  dto.ChangePasswordRequest:
    properties:
      id:
        type: integer
      new_password:
        minLength: 8
        type: string
      old_password:
        minLength: 8
        type: string
    required:
    - new_password
    - old_password
    type: object
  dto.DashboardSwaggerResponse:
    properties:
      data:
        $ref: '#/definitions/dto.DashboardUser'
      message:
        type: string
      success:
        type: boolean
    type: object
  dto.DashboardUser:
    properties:
      balance:
        type: number
      expense:
        type: number
      income:
        type: number
    type: object
  dto.ErrorSwaggerResponse:
    properties:
      error:
        example: validation error
        type: string
      message:
        example: bad request
        type: string
      success:
        example: false
        type: boolean
    type: object
  dto.IncomeExpenseChart:
    properties:
      amount:
        type: number
      date:
        type: string
      type:
        type: string
    type: object
  dto.LoginRequest:
    properties:
      email:
        example: naufal@test.com
        type: string
      password:
        example: "12345678"
        minLength: 8
        type: string
    required:
    - email
    - password
    type: object
  dto.LoginResponse:
    properties:
      display_name:
        type: string
      isPinExists:
        type: boolean
      photo:
        type: string
      token:
        type: string
    type: object
  dto.LoginSwaggerResponse:
    properties:
      data:
        $ref: '#/definitions/dto.LoginResponse'
      message:
        type: string
      success:
        type: boolean
    type: object
  dto.LogoutSwaggerResponse:
    properties:
      logout success:
        type: string
      success:
        type: boolean
    type: object
  dto.PaginationMeta:
    properties:
      limit:
        type: integer
      page:
        type: integer
      total:
        type: integer
      total_pages:
        type: integer
    type: object
  dto.PaymentMethods:
    properties:
      id:
        type: integer
      logo:
        type: string
      name:
        type: string
    type: object
  dto.ProfileSwaggerResponse:
    properties:
      data:
        $ref: '#/definitions/dto.Profiles'
      message:
        example: ok
        type: string
      success:
        example: true
        type: boolean
    type: object
  dto.Profiles:
    properties:
      created_at:
        type: string
      fullname:
        type: string
      phone:
        type: string
      photo:
        type: string
      updated_at:
        type: string
      user_id:
        type: integer
    type: object
  dto.ReceiverPaginationResponse:
    properties:
      data:
        items:
          $ref: '#/definitions/dto.Receivers'
        type: array
      meta:
        $ref: '#/definitions/dto.PaginationMeta'
    type: object
  dto.ReceiverSwaggerResponse:
    properties:
      data:
        items:
          $ref: '#/definitions/dto.ReceiverPaginationResponse'
        type: array
      message:
        example: success to get all transactions
        type: string
      success:
        example: true
        type: boolean
    type: object
  dto.Receivers:
    properties:
      fullName:
        type: string
      id:
        type: integer
      phone:
        type: string
      photo:
        type: string
    type: object
  dto.RegisterRequest:
    properties:
      email:
        type: string
      password:
        minLength: 8
        type: string
    required:
    - email
    - password
    type: object
  dto.RegisterSwaggerResponse:
    properties:
      data: {}
      message:
        type: string
      success:
        type: boolean
    type: object
  dto.TopupRequest:
    properties:
      amount:
        type: integer
      method_id:
        type: integer
    type: object
  dto.TopupResponse:
    properties:
      admin_fee:
        type: number
      amount:
        type: number
      created_at:
        type: string
      payment_reference:
        type: string
      reference_code:
        type: string
      status:
        type: string
      tax_amount:
        type: number
      total:
        type: number
      transaction_id:
        type: integer
    type: object
  dto.TransactionPaginationResponse:
    properties:
      data:
        items:
          $ref: '#/definitions/dto.TransactionResponse'
        type: array
      meta:
        $ref: '#/definitions/dto.PaginationMeta'
    type: object
  dto.TransactionResponse:
    properties:
      amount:
        type: number
      counterparty_name:
        description: Nama lawan / nama payment method
        type: string
      counterparty_phone:
        description: Pakai pointer agar aman dari NULL
        type: string
      created_at:
        type: string
      flow_type:
        description: '"in" atau "out"'
        type: string
      reference_code:
        type: string
      status:
        type: string
      transaction_id:
        type: integer
      transaction_label:
        description: '"Top Up", "Transfer Masuk"'
        type: string
      transaction_type:
        description: '"topup" atau "transfer"'
        type: string
    type: object
  dto.TransferRequest:
    properties:
      amount:
        type: number
      description:
        type: string
      pin:
        type: string
      receiver_wallet_id:
        type: integer
    type: object
  dto.TransferResponse:
    properties:
      amount:
        type: number
      created_at:
        type: string
      description:
        type: string
      receiver_wallet_id:
        type: integer
      reference_code:
        type: string
      sender_wallet_id:
        type: integer
      status:
        type: string
      transaction_id:
        type: integer
    type: object
  dto.UserPIN:
    properties:
      pin:
        type: string
    type: object
host: localhost:5000
info:
  contact: {}
  description: Backend created by Koda using Gin
  license:
    name: MIT
  title: Backend Koda 7
  version: "1.0"
paths:
  /auth/login:
    post:
      consumes:
      - application/json
      description: login user using email and password
      parameters:
      - description: login payload
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/dto.LoginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.LoginSwaggerResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/dto.ErrorSwaggerResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/dto.ErrorSwaggerResponse'
      summary: Login user
      tags:
      - auth
  /auth/logout:
    delete:
      description: for logout
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.LogoutSwaggerResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/dto.ErrorSwaggerResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/dto.ErrorSwaggerResponse'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/dto.ErrorSwaggerResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/dto.ErrorSwaggerResponse'
      security:
      - ApiKeyAuth: []
      summary: Delete user token
      tags:
      - auth
  /auth/password:
    patch:
      consumes:
      - application/json
      description: change current user password
      parameters:
      - description: change password payload
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/dto.ChangePasswordRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.RegisterSwaggerResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/dto.ErrorSwaggerResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/dto.ErrorSwaggerResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/dto.ErrorSwaggerResponse'
      security:
      - ApiKeyAuth: []
      summary: Update user password
      tags:
      - auth
  /auth/pin:
    patch:
      consumes:
      - application/json
      description: update existing user PIN
      parameters:
      - description: pin payload
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/dto.UserPIN'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.RegisterSwaggerResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/dto.ErrorSwaggerResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/dto.ErrorSwaggerResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/dto.ErrorSwaggerResponse'
      security:
      - ApiKeyAuth: []
      summary: Update user PIN
      tags:
      - auth
    post:
      consumes:
      - application/json
      description: create PIN for user
      parameters:
      - description: pin payload
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/dto.UserPIN'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/dto.RegisterSwaggerResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/dto.ErrorSwaggerResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/dto.ErrorSwaggerResponse'
      security:
      - ApiKeyAuth: []
      summary: Set user PIN
      tags:
      - auth
  /auth/register:
    post:
      consumes:
      - application/json
      description: register new user account
      parameters:
      - description: register payload
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/dto.RegisterRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/dto.RegisterSwaggerResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/dto.ErrorSwaggerResponse'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/dto.ErrorSwaggerResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/dto.ErrorSwaggerResponse'
      summary: Register user
      tags:
      - auth
  /transactions:
    get:
      consumes:
      - application/json
      description: get paginated transaction history for logged-in user
      parameters:
      - description: page number
        in: query
        name: page
        type: integer
      - description: limit per page
        in: query
        name: limit
        type: integer
      - description: search keyword
        in: query
        name: search
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.TransactionPaginationResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/dto.ErrorSwaggerResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/dto.ErrorSwaggerResponse'
      security:
      - ApiKeyAuth: []
      summary: Get all user transactions
      tags:
      - transaction
  /transactions/chart:
    get:
      consumes:
      - application/json
      description: get chart data for income, expense, or both with period filter
        (7d or 1m)
      parameters:
      - description: type filter (income | expense | all)
        in: query
        name: type
        type: string
      - description: period filter (7d | 1m)
        in: query
        name: period
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/dto.IncomeExpenseChart'
            type: array
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/dto.ErrorSwaggerResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/dto.ErrorSwaggerResponse'
      security:
      - ApiKeyAuth: []
      summary: Get income/expense chart data
      tags:
      - transaction
  /transactions/payments:
    get:
      description: get all payment methods
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.PaymentMethods'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/dto.ErrorSwaggerResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/dto.ErrorSwaggerResponse'
      summary: get all methods for top up flow
      tags:
      - transaction
  /transactions/pin:
    post:
      consumes:
      - application/json
      description: validate user PIN before transaction
      parameters:
      - description: pin payload
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/dto.UserPIN'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.RegisterSwaggerResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/dto.ErrorSwaggerResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/dto.ErrorSwaggerResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/dto.ErrorSwaggerResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/dto.ErrorSwaggerResponse'
      security:
      - ApiKeyAuth: []
      summary: Check user PIN
      tags:
      - transaction
  /transactions/topup:
    post:
      consumes:
      - application/json
      description: add balance to user wallet
      parameters:
      - description: topup payload
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/dto.TopupRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.TopupResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/dto.ErrorSwaggerResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/dto.ErrorSwaggerResponse'
      security:
      - ApiKeyAuth: []
      summary: Topup wallet balance
      tags:
      - transaction
  /transactions/transfer:
    post:
      consumes:
      - application/json
      description: send money between wallets
      parameters:
      - description: transfer payload
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/dto.TransferRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.TransferResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/dto.ErrorSwaggerResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/dto.ErrorSwaggerResponse'
      security:
      - ApiKeyAuth: []
      summary: Transfer balance to another wallet
      tags:
      - transaction
  /transactions/transfer/receivers:
    get:
      consumes:
      - application/json
      description: get all receiver users with pagination and search
      parameters:
      - description: page number
        example: 1
        in: query
        name: page
        type: integer
      - description: limit data
        example: 10
        in: query
        name: limit
        type: integer
      - description: search by fullname or phone
        in: query
        name: search
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.ReceiverSwaggerResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/dto.ErrorSwaggerResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/dto.ErrorSwaggerResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/dto.ErrorSwaggerResponse'
      security:
      - ApiKeyAuth: []
      summary: Get all receivers
      tags:
      - transaction
  /user/profile:
    get:
      description: get authenticated user profile
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.ProfileSwaggerResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/dto.ErrorSwaggerResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/dto.ErrorSwaggerResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/dto.ErrorSwaggerResponse'
      security:
      - ApiKeyAuth: []
      summary: Get user profile
      tags:
      - user
    put:
      consumes:
      - multipart/form-data
      description: update authenticated user profile
      parameters:
      - description: full name
        in: formData
        name: fullname
        type: string
      - description: phone number
        in: formData
        name: phone
        type: string
      - description: profile photo
        in: formData
        name: photo
        type: file
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.ProfileSwaggerResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/dto.ErrorSwaggerResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/dto.ErrorSwaggerResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/dto.ErrorSwaggerResponse'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/dto.ErrorSwaggerResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/dto.ErrorSwaggerResponse'
      security:
      - ApiKeyAuth: []
      summary: Edit user profile
      tags:
      - user
  /wallet/dashboard:
    get:
      description: get wallet dashboard data for authenticated user
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.DashboardSwaggerResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/dto.ErrorSwaggerResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/dto.ErrorSwaggerResponse'
      security:
      - ApiKeyAuth: []
      summary: Get dashboard
      tags:
      - wallet
securityDefinitions:
  ApiKeyAuth:
    description: Bearer token used for authorization
    in: header
    name: Authorization
    type: apiKey
swagger: "2.0"
